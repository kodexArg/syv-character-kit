  historia: 'Mansilla no disparó un arma en combate hasta los treinta y dos años. Era redactor del boletín sindical de los metalúrgicos de Bahía Blanca, después comisario político de la segunda región, después instructor de cuadros en Stroeder. La revolución tiene usos para un hombre que sabe leer mapas y convencer a otros de que la causa vale el riesgo. El campo de batalla no estaba en su programa. Cuando llegó el informe del Sector 12,15, Mansilla fue uno de los tres hombres que lo analizaron. Anotó: "respuesta táctica competente del oficial azul". Después recomendó eliminarlo antes de la siguiente operación. El alto mando lo comisionó para liderar la escuadra de caza — no por tirador, sino porque conoce el informe y no carga rencor.'
  historial:
  - fecha: '2026-02-28T10:00:00Z'
    tipo: traslado
    descripcion: Comisionado de Stroeder al frente sur como líder de escuadra de caza.
    ref_batalla: null
    metadata:
      motivo: decisión del alto mando tras análisis del Sector 12,15
  - fecha: '2026-04-18T17:30:00Z'
    tipo: identificacion_nemesis
    descripcion: >
      Identifica formalmente al Sargento Aguirre como objetivo prioritario tras
      el análisis del informe del Sector 12,15. Rivalidad de papel y de mapa —
      no se conocen en persona.
    ref_batalla: null
    metadata:
      ref: aguirre_walter
  - fecha: '2026-05-24T00:00:00Z'
    tipo: formacion_lealtad
    descripcion: Instructor metalúrgico de Bahía Blanca, su mentor en lectura de mapas.
    ref_batalla: null
    metadata:
      ref: mentor_metalurgico_bahia_blanca
  - fecha: '2026-05-24T00:00:00Z'
    tipo: formacion_lealtad
    descripcion: Iturra señalada como segunda en la formación de la escuadra.
    ref_batalla: null
    metadata:
      ref: iturra_delia
  - fecha: '2026-05-24T00:00:00Z'
    tipo: formacion_lealtad
    descripcion: Antinao elegido como tirador de vanguardia para el objetivo.
    ref_batalla: null
    metadata:
      ref: antinao_hector
  aliados:
  - ref: mentor_metalurgico_bahia_blanca
    descripcion: >
      El instructor que le enseñó a leer mapas cuando todavía redactaba
      comunicados sindicales en la imprenta del gremio. Mansilla guarda su
      cuaderno de anotaciones — letra apretada, márgenes con cálculos de
      escala. No volvió a verlo desde Stroeder.
    desde: '2024-03-01'
  - ref: iturra_delia
    descripcion: >
      La señaló como segunda al armar la escuadra. La conocía solo por expediente
      — cuatro acciones limpias, dos dedos quemados en la represión de la usina.
      Mansilla confía en gente que no necesita explicaciones. Iturra es de esa
      clase.
    desde: '2026-03-15'
  - ref: antinao_hector
    descripcion: >
      El tirador. Mansilla decide qué blanco; Antinao decide cuándo. División
      de trabajo aceptada por ambos sin conversarla. Mansilla anotó en su
      cuaderno: "no malgasta un tiro".
    desde: '2026-03-15'
  nemesis:
  - ref: aguirre_walter
    descripcion: >
      El Sargento azul del Sector 12,15. Mansilla anotó su nombre en el informe
      y recomendó eliminarlo antes de la siguiente operación. No se conocen en
      persona — el rival es de papel y de mapa. Mansilla no carga rencor; carga
      el cálculo de que ese oficial es el problema operativo más urgente.
    desde: '2026-04-18'
