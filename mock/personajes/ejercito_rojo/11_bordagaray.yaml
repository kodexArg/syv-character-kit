  historia: |
    El abuelo de Sebastián Bordagaray llegó del País Vasco en 1923 y terminó
    en los frigoríficos de Bahía Blanca. El padre fue metalúrgico. Sebastián
    fue la primera generación de la familia que tuvo posibilidad de no trabajar
    con las manos, y eligió las manos igual — taller mecánico en el barrio
    Noroeste, tres años, hasta que la revolución cambió lo que valía la pena
    hacer con el tiempo. No es el más hábil ni el más rápido. Tiene buena
    constitución y una disposición a meterse donde nadie quiere meterse que
    Mansilla notó en los primeros días de entrenamiento. "Ese va adelante
    cuando los demás van atrás", le comentó a Iturra. Iturra dijo que eso
    también podía matarlo. Mansilla dijo que ya lo sabía. Lo que Bordagaray no
    le dijo a nadie es que el operativo de caza lo inquieta de un modo que no
    puede articular. No es el peligro — es la especificidad: ir a matar a
    alguien en particular.

