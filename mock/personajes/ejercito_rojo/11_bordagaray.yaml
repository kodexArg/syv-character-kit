  aliados:
  - ref: mansilla_ramon
    descripcion: >
      El Camarada Puntero lo identificó como el que va adelante cuando los
      demás retroceden. Bordagaray retribuye con esa misma disposición sin
      preguntarse si es virtud o problema. Lo que no le dice: el operativo de
      caza lo inquieta — no el peligro, la especificidad.
    desde: '2026-03-20'
  - ref: maturana_claudio
    descripcion: >
      El peón de estancia. Llegaron tarde los dos a la formación final y desde
      entonces se hacen compañía sin proponérselo. Bordagaray repara lo que
      Maturana rompe sin avisar; Maturana lee el viento y Bordagaray no
      pregunta cómo.
    desde: '2026-04-05'
