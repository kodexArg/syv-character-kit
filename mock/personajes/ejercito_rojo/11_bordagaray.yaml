  aspectos:
    concepto: "Tercera generación de huelguistas; el peso familiar lo empuja sin que lo note."
    perk_fijo:
      id: p_custom_escudo_humano
      nombre: Escudo humano
      descripcion: >
        Si un impacto se asigna al Camarada Puntero o a Iturra, Bordagaray
        puede interceptar el impacto y realizar la salvación en su lugar.
    complicacion_fija:
      id: c_custom_hemorragia_lenta
      nombre: Hemorragia lenta
