  historia: |
    Claudio Maturana pasó cuatro años trabajando en estancias al sur del Chubut
    — esquila, marcación, alambrado. Los estancieros de esa zona no distinguían
    mucho entre un peón y una herramienta. Maturana tampoco los distinguía a
    ellos de ningún patrón que hubiera conocido antes. Cuando un agitador rojo
    llegó a la zona prometiendo cambiar eso, Maturana preguntó cuánto pagaban
    y cuánto había que caminar. Creció en la meseta y conoce la niebla
    patagónica mejor que la mayoría: sabe leer el viento, distinguir siluetas
    en la llovizna, moverse sin orientarse por referencias visuales claras.
    Eso le da utilidad en condiciones que paralizan a gente con más
    entrenamiento formal. No tiene opinión firme sobre el operativo de caza.
    No conoce bien el contexto del Sector 12,15. Sigue a Mansilla porque
    Mansilla parece saber lo que hace. Si resulta que no sabe, Maturana va a
    notar el problema probablemente antes que el resto.

