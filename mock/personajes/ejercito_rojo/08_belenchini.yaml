  aliados:
  - ref: carcamo_fermin
    descripcion: >
      El ferroviario de Bahía Blanca. Belenchini viene de la siderúrgica;
      Cárcamo del puerto sur. La ciudad les ahorra explicaciones — saben de los
      mismos barrios y los mismos hijos esperando.
    desde: '2026-03-20'
  nemesis:
  - ref: acosta_ruben
    descripcion: >
      El fusilero mendocino del frente norte. Belenchini lo vio caer por su
      metralla pero después supo que había sobrevivido. La cicatriz que le dejó
      es la que ahora lo identifica del otro lado, y eso le produce un fastidio
      que no admite — la deuda quedó abierta porque el otro no terminó de morir.
    desde: '2024-08-15'
