  - fecha: '2024-08-15T18:00:00Z'
    tipo: identificacion_nemesis
    descripcion: >
      Cruzó el río Negro al amanecer en operación de flanqueo en el frente
      norte. Vio caer a un fusilero confederado por su metralla — joven, de
      Mendoza por el acento que escuchó al gritar. Lo retuvo porque sobrevivió.
    ref_batalla: null
    metadata:
      ref: acosta_ruben
  - fecha: '2026-05-24T00:00:00Z'
    tipo: formacion_lealtad
    descripcion: Ambos bahienses. La ciudad los une más que la doctrina.
    ref_batalla: null
    metadata:
