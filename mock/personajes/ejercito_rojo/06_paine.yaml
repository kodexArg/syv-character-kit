  historia: 'Rosa Painé tiene treinta años y viene de una comunidad mapuche al norte del lago Musters. No llegó al Ejército Rojo por el sindicato sino por el camino más largo: vio lo que la Confederación hizo a las tierras comunitarias de su zona cuando necesitaba espacio para sus líneas de comunicación, y decidió que el bando que se oponía a la Confederación era el suyo, al menos por ahora. La contradicción del Ejército Rojo con la maquinaria la siente más aguda que la mayoría. El Ejército dice ser antimaquinista pero usa fusiles, radio, camiones. Painé lo menciona de vez en cuando. La respuesta habitual es que las armas son una necesidad táctica transitoria. Ella asiente sin estar del todo convencida. En combate aprendió que el terreno abierto la pone nerviosa. Lo sabe. Lo trabaja. Hasta ahora no le ha costado la vida.'
