  historia: |
    Héctor Antinao creció en la meseta, entre Roca y el Limay. Cazaba con su
    padre desde los doce años: liebre, martineta, guanaco cuando la temporada
    daba. No era cuestión de deporte sino de comer. A los veintidós cruzó a la
    costa y terminó cargando bolsas en el puerto de Viedma por dos años. Ahí
    conoció a los agitadores ferroviarios y, a través de ellos, al Ejército
    Rojo. Nadie le enseñó a disparar en el ejército. Lo que le enseñaron fue a
    no malgastar el tiro. En acción tiene fama de esperar más de lo que sus
    compañeros consideran razonable antes de apretar el gatillo. A él le parece
    simplemente la única forma sensata de proceder. El objetivo del operativo
    no le genera ni repulsión ni entusiasmo. Si Mansilla lo pone en la mira,
    Antinao va a hacer lo que sabe hacer.

