  historia: 'Héctor Antinao creció en la meseta, entre Roca y el Limay. Cazaba con su padre desde los doce años: liebre, martineta, guanaco cuando la temporada daba. No era cuestión de deporte sino de comer. A los veintidós cruzó a la costa y terminó cargando bolsas en el puerto de Viedma por dos años. Ahí conoció a los agitadores ferroviarios y, a través de ellos, al Ejército Rojo. Nadie le enseñó a disparar en el ejército. Lo que le enseñaron fue a no malgastar el tiro. En acción tiene fama de esperar más de lo que sus compañeros consideran razonable antes de apretar el gatillo. A él le parece simplemente la única forma sensata de proceder. El objetivo del operativo no le genera ni repulsión ni entusiasmo. Si Mansilla lo pone en la mira, Antinao va a hacer lo que sabe hacer.'
  historial:
  - fecha: '2026-04-22T11:00:00Z'
    tipo: identificacion_nemesis
    descripcion: >
      Cruce de tiradores en niebla cerca del filo del valle. Antinao vio el
      destello de un apuntador confederado a unos trescientos metros y entendió
      que el otro lo había visto a él. Ninguno acertó. Lo guardó.
    ref_batalla: null
    metadata:
      ref: quiroga_lisandro
  - fecha: '2026-05-24T00:00:00Z'
    tipo: formacion_lealtad
    descripcion: Mansilla decide qué blanco. Antinao decide cuándo.
    ref_batalla: null
    metadata:
