  aliados:
  - ref: mansilla_ramon
    descripcion: >
      El Camarada Puntero le indica el blanco; Antinao elige el momento. División
      del trabajo que no necesitan hablar. El cazador de meseta acepta que el
      hombre del cuaderno sepa qué cabeza vale el riesgo del operativo.
    desde: '2026-03-15'
  nemesis:
  - ref: quiroga_lisandro
    descripcion: >
      El apuntador azul del filo del valle. Antinao lo vio en niebla y supo que
      el otro lo había visto. No es venganza — es respeto profesional con
      consecuencia: el que se mueva primero la próxima vez, pierde.
    desde: '2026-04-22'
