  historia: |
    Delia Iturra tiene treinta y ocho años y dos dedos de la mano derecha soldados
    entre sí por una quemadura de vapor en la usina ferroviaria de Carmen de
    Patagones. Aprendió a disparar con esa mano igual, porque no había otra
    opción cuando la patronal trajo los primeros rompehuelgas armados en el
    verano del año cuatro. "Si te van a matar de todas formas, mejor que sea
    por algo que valga", le dijo entonces a la compañera que le enseñó a cargar
    el Mauser. Estuvo en cuatro acciones antes de este operativo. Nunca ocupó
    un rol de mando formal hasta que Mansilla la señaló como segunda. La
    venganza del Sector 12,15 le importa en la medida en que le importan todas
    las muertes: como deuda colectiva, no como drama personal. Matar a un
    oficial específico parece más ajuste de cuentas que operación táctica. Se
    lo guardó para ella.

  historial:
