    descripcion: >
      El Sargento lo eligió sin entrevistarlo y sin explicar. Sosa retribuye con
      la única forma que conoce: cuentas exactas, posición clara, ninguna
      pregunta innecesaria sobre el Sector 12,15.
    desde: '2026-04-10'
