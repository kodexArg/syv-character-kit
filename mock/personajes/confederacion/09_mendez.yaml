  historia: |
    Ignacio Méndez tiene diecinueve años y es de San Rafael, Mendoza. Trabajaba
    en la viña familiar — cosecha, poda, los trabajos que dicta el calendario
    agrícola — antes de que la conscripción lo sacara del ciclo. Su padre lo
    acompañó hasta el punto de embarque sin decir mucho, que es como hacen las
    cosas en San Rafael. En la instrucción fue regular en todo y destacó en
    resistencia física — el trabajo en la viña le dio una base muscular que los
    ejercicios solo refinaron. Su TAC es baja porque todavía no interiorizó el
    timing del combate: sabe usar el arma, pero la usa un segundo tarde bajo
    presión. Lo asignaron a recargador del artillero Funes porque alguien en
    logística vio la nota de resistencia física y lo marcó para carga pesada.
    Méndez no protestó porque no sabe bien qué implica el rol todavía. Lo está
    aprendiendo.
