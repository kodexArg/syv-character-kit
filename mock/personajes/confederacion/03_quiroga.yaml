    tipo: identificacion_nemesis
    descripcion: >
      Cruce de tiradores en niebla cerca del filo del valle. Quiroga vio el
      destello de mira de otro apuntador a unos trescientos metros — no acertó
      ninguno de los dos. Quedaron como referencia recíproca.
    ref_batalla: null
