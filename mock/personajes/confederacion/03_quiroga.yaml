    concepto: "Agrimensor frustrado que dispara solo cuando está seguro."
    perk_fijo:
      id: p_custom_olfato_del_terreno
      nombre: Olfato del terreno
      descripcion: >
        En escenarios con visión reducida (niebla, llovizna, humo), Quiroga
        ignora las penalizaciones de visión en sus tiradas de TAC.
    complicacion_fija:
      id: c_custom_punteria_fria_mente_fria
