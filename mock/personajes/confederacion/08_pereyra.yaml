  historia: Graciela Pereyra es de Rawson, Chubut — nació y creció en la Patagonia, así que el frío no la sorprendió como a los norteños de la escuadra. Lo que la sorprendió fue el ruido. En Rawson el viento hace su propio ruido constante; el del combate es diferente, más concentrado y arbitrario. Su familia no entiende del todo por qué pidió mantenerse en el frente patagónico cuando le ofrecieron reasignación a logística. Ella explicó que era más útil en línea, que tenía experiencia de terreno, que había razones tácticas. Probablemente haya algo más, pero no lo dice y nadie le insiste. Con Olivares y Rodríguez terminaron en el mismo pelotón de asignación y en la misma escuadra por azar. No son amigos exactamente, pero se conocen lo suficiente como para saber cuándo el otro está funcionando mal.
