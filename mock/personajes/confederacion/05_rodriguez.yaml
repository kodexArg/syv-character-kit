    descripcion: >
      Mismo pelotón de asignación desde el embarque. Se conocen lo suficiente
      como para saber cuándo el otro está funcionando mal. Marcela le ajusta el
      uniforme cuando lo ve mal puesto — costumbre de costurera, no afecto.
    desde: '2026-02-01'
