    descripcion: >
      El veterano del norte. Ramírez le pregunta cuando no sabe — sin pudor,
      porque a los dieciocho todavía no aprendió a fingir que sabe. Acosta le
      responde corto y se vuelve a la cobertura. Ese intercambio le basta.
    desde: '2026-05-10'
  - ref: aguirre_walter
    descripcion: >
