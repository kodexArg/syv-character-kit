  - ref: ricardo_sargento_postmortem
    descripcion: >
      El Sargento Ricardo lo formó con tareas, no con palabras. Cuando cayó en el
      Sector 12,15, Walter heredó el parche sin festejarlo. Lleva el cuaderno de
      Ricardo en el bolsillo de pecho — costumbre, no superstición.
    desde: '2025-08-01'
  - ref: sosa_horacio
    descripcion: >
      Lo eligió Cabo Primero por expediente, sin conocerlo del Sector 12,15. A las
      dos semanas confirmó la elección: Sosa no le pregunta cómo murió Ricardo y
      eso le alcanza. Confianza recíproca sin palabras.
    desde: '2026-04-10'
  - ref: quiroga_lisandro
    descripcion: >
      El apuntador del sector. Aguirre le pide lectura del terreno antes de cada
      despliegue y Quiroga le devuelve frases cortas que valen. No son amigos —
      son dos tipos que se respetan el oficio.
    desde: '2026-04-10'
