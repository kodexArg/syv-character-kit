    descripcion: >
      El Sargento Ricardo lo formó con tareas, no con palabras. Cuando cayó en el
      Sector 12,15, Héctor heredó el parche sin festejarlo. Lleva el cuaderno de
      Ricardo en el bolsillo de pecho — costumbre, no superstición.
    desde: '2025-08-01'
  - ref: HS7M4N1P
    descripcion: >
      Lo eligió Cabo Primero por expediente, sin conocerlo del Sector 12,15. A las
      dos semanas confirmó la elección: Sosa no le pregunta cómo murió Ricardo y
      eso le alcanza. Confianza recíproca sin palabras.
    desde: '2026-04-10'
  - ref: LQ5C8D3R
    descripcion: >
