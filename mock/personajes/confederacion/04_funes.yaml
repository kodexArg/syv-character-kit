    tipo: identificacion_nemesis
    descripcion: >
      Intercambio de fuego prolongado contra un FAP enemigo en el filo del
      cañadón. Funes anotó el ritmo de ráfagas del otro y lo guardó en el
      almanaque. Sabe identificarlo de oído.
    ref_batalla: null
