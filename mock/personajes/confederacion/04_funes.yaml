    descripcion: >
      El recargador asignado. Funes le marca el ritmo del arma sin explicarle
      teoría — el chaqueño aprendió que se aprende mirando. A los dos meses
      Méndez ya anticipa la próxima cinta antes de que Funes la pida.
    desde: '2026-04-15'
  - ref: sosa_horacio
    descripcion: >
      El Cabo Primero le pasa el conteo de munición por radio. Dos parcos que se
      entienden por dotaciones de cargador y nada más.
    desde: '2026-04-15'
