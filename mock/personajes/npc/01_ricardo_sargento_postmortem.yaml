  historia: 'Ricardo no dejó autobiografía. Lo que quedó de él son las tareas que
    asignó, las decisiones que tomó en silencio y el cuaderno que le pasó a Aguirre
    antes del Sector 12,15. Entró a la Confederación diez años antes de que Aguirre
    naciera como soldado — salió como Sargento porque los hombres que él formaba
    sobrevivían más que los de los otros. No era carisma ni disciplina de manual:
    era la costumbre de asignar trabajo difícil a quien podía hacerlo y no explicar
    por qué. Murió en el Sector 12,15 durante una acción de flanqueo. Aguirre
    organizó la retirada. Ricardo ya no estaba cuando el parche llegó, pero el
    parche era para su escuadra.'
