  historia: 'Villagra pasó veinte años en la imprenta del sindicato de metalúrgicos
    de Bahía Blanca antes de que alguien le pusiera un mapa en las manos y le pidiera
    que explicara la escala. Tenía cuarenta años. En tres meses enseñó a leer
    cartografía a cuarenta y dos cuadros del movimiento — letra apretada, márgenes
    con cálculos, la misma paciencia que usaba para corregir pruebas de imprenta.
    Mansilla fue uno de sus alumnos, el más aplicado y el más obstinado. Villagra
    le enseñó que un mapa dice más sobre quién lo dibujó que sobre el terreno.
    Mansilla anotó esa frase al frente de su cuaderno. Desde Stroeder, Villagra
    no tuvo noticias del comisario político. El cuaderno de anotaciones que le
    dejó sigue en uso.'
