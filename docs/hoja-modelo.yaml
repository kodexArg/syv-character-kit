personaje:

  # ── Identidad ─────────────────────────────────────────────────────────────
  identidad:
    slug: str               # generado al persistir (mock o DB); única clave de referencia
    nombre: str
    sobrenombre: str        # null si coincide con nombre
    rol: str                # narrativo base; default "ciudadano"
    genero: str
    edad: int

  # ── Facción ───────────────────────────────────────────────────────────────
  faccion:
    faccion: str            # "Confederación" | "Ejército Rojo" | otro
    filiacion: str          # null si no aplica; derivable
    escuadra: str           # slug de la escuadra; null si no asignado
    rango: str              # null si civil/sin rango
    mando: bool             # ¿tiene mando en la facción?
    estado: str             # activo | disponible | kia | licencia

  # ── Atributos ─────────────────────────────────────────────────────────────
  atributos:
    fis: int
    tac: int
    men: int

  # ── Salud (agrupación de tags; fatiga se calcula en caliente) ─────────────
  salud:
    - "[variable salud_tag]"   # cansado | exhausto | agotado | herido | malherido | sangrando | enfermo | aturdido

  # ── Mental (agrupación de tags; moral se calcula en caliente) ─────────────
  mental:
    - "[variable mental_tag]"  # pánico | confundido | desmoralizado | iracundo | traumatizado | conmocionado | berserker | sereno

  # ── Lealtades ─────────────────────────────────────────────────────────────
  lealtades:
    primaria: "[variable lealtad_primaria]"
    secundarias:
      - "[variable lealtad_secundaria]"
    secretos:
      - "[variable lealtad_secreta]"

  # ── Tags (el resto: rasgos, traits, perks, aspectos, skills, equipo, rol.*) ─
  tags:
    - categoria: str
      valor: str

  # ── Vínculos ──────────────────────────────────────────────────────────────
  vinculos:
    - tipo: "[variable vinculo_tipo]"
      ref_personaje_slug: "[variable vinculo_ref_personaje_slug]"
      descripcion: "[variable vinculo_descripcion]"

  # ── Prosa biográfica ──────────────────────────────────────────────────────
  historia: str             # 120-200 palabras; LLM en creación; congelada al persistir

  # ── Historial de hitos ────────────────────────────────────────────────────
  historial:
    - fecha: "[variable hito_fecha]"
      tipo: "[variable hito_tipo]"
      descripcion: "[variable hito_descripcion]"
      ref_batalla: "[variable hito_ref_batalla]"
      metadata: {}

  # ── Snapshot de auditoría ─────────────────────────────────────────────────
  tags_iniciales:
    - categoria: str
      valor: str

  # ── Metadatos ─────────────────────────────────────────────────────────────
  metadatos:
    creado_en: str
    canonizado_en: str
    ultima_actualizacion: str

  # ── Escape hatch (estructura libre, cualquier llave) ──────────────────────
  extras: object
