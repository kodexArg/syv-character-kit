# Template programático del personaje.
# Referencia narrativa: hoja-modelo.md
# Sistema de tags: tag-modelo.md
# Ejemplos compuestos: tag-modelo-ejemplos.yaml
#
# Convención de marcas:
#   (*) campo obligatorio siempre
#   (+) campo obligatorio cuando el contexto lo demanda (canonización, presencia de tags, etc.)
#   sin marca: campo opcional

personaje:

  identidad:
    slug:        str         # (+) requerido al persistir. Patente opaca [A-Z0-9]{8}. Ver hoja-modelo.md §1.1.
    nombre:      str         # (*)
    sobrenombre: str         #     null si coincide con nombre o no hay distinción.
    rol:         str         # (*) narrativo base. Default "ciudadano".
    genero:      str         # (*) masculino | femenino | no_binario | otro
    edad:        int         # (*)

  atributos:
    fis:         int         # (*) 2..5
    tac:         int         # (*) 2..5
    men:         int         # (*) 2..7 (líderes hasta 7)

  # Lista plana de tags en notación punto: <categoria>[.<subcategoria>].<slug>.
  # Multiset — admite repetidos. Vacía al crear; se puebla según rango/facción y/o curaduría.
  # Categorías canon y reglas en tag-modelo.md §3.
  tags:                      # (*) lista; default []
    - faccion.*
    - rango.*
    - escuadra.*
    - mando.capaz
    - estado.*               # (+) exactamente uno: activo | disponible | kia | licencia
    - salud.*                #     acumulable
    - mental.*               #     acumulable
    - rasgo.*
    - trait.*
    - perk.*
    - aspecto.*
    - skill.*
    - equipo.arma.*
    - equipo.utilitario.*    #     repetible (multiset)
    - equipo.vestidura.*
    - rol.oficio.*
    - rol.jerarquia.*
    - rol.narrativo.*
    - rol.mecanico.*         #     lider | heroe — afecta fza_aportada derivada
    - lealtad.faccion.*
    - lealtad.pj.*           #     ref a patente [A-Z0-9]{8} de personaje
    - lealtad.escuadra.*
    - nemesis.pj.*           #     ref a patente [A-Z0-9]{8} de personaje

  historia:    str           # (+) requerido al canonizar. 120-200 palabras. Congelada tras persistir.

  historial:                 # (*) lista; default []
    - fecha:       str       # (*) ISO-8601
      tipo:        str       # (*) enum abierto. Ver hoja-modelo.md §5.
      descripcion: str       # (*)
      ref_batalla: str       #     slug de batalla externa | null
      metadata:    object    #     libre

  metadatos:
    creado_en:            str   # (*) ISO-8601
    canonizado_en:        str   # (+) ISO-8601 al persistir; null en efímeros
    ultima_actualizacion: str   # (*) ISO-8601; actualiza con cada hito

  extras: object             #     escape hatch libre; null por defecto

# Campos derivados al servir (NO persistidos, NO declarados acá):
#   filiacion, sobrenombre (cuando derivable), fatiga_max, moral_max, fza_aportada,
#   aliados, nemesis. Fórmulas en hoja-modelo.md §3.1.
