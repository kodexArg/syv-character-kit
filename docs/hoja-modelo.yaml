personaje:

  # ── Identidad ─────────────────────────────────────────────────────────────
  identidad:
    slug: str               # generado al persistir; única clave estable de referencia
    nombre: str
    sobrenombre: str        # null si coincide con nombre
    rol: str                # narrativo base; default "ciudadano"
    genero: str
    edad: int

  # ── Atributos ─────────────────────────────────────────────────────────────
  atributos:
    fis: int                # 2-5
    tac: int                # 2-5
    men: int                # 2-7 (líderes hasta 7)

  # ── Tags ──────────────────────────────────────────────────────────────────
  # Lista plana de tags en notación punto: <categoria>[.<subcategoria>].<slug>.
  # Todo lo discreto vive aquí: facción, rango, escuadra, mando, estado,
  # salud, mental, rasgos, traits, perks, aspectos, skills, equipo.*, rol.*,
  # lealtades y némesis. Ver tag-modelo.md para categorías y ejemplos.
  # Lista repetible (multiset): equipo.utilitario.cargador puede aparecer N veces.
  tags:
    - "[tag faccion.*]"             # ej. faccion.ejercito_rojo
    - "[tag rango.*]"               # ej. rango.lider_de_escuadra
    - "[tag escuadra.*]"            # ej. escuadra.ricardo
    - "[tag mando.capaz]"           # presencia = capacidad de mando
    - "[tag estado.*]"              # exactamente uno: activo | disponible | kia | licencia
    - "[tag salud.*]"               # acumulable; cansado | herido | sangrando | ...
    - "[tag mental.*]"              # acumulable; panico | confundido | sereno | ...
    - "[tag rasgo.*]"               # rasgo físico observable
    - "[tag trait.*]"               # rasgo de carácter sin mecánica
    - "[tag perk.*]"                # ventaja reglada
    - "[tag aspecto.*]"             # mini-tag identitario con efecto
    - "[tag skill.*]"               # habilidad aprendida
    - "[tag equipo.arma.*]"         # arma cargada
    - "[tag equipo.utilitario.*]"   # objeto utilitario (repetible)
    - "[tag equipo.vestidura.*]"    # identidad visual
    - "[tag rol.oficio.*]"          # oficio operativo (ej. francotirador)
    - "[tag rol.jerarquia.*]"       # título militar (ej. sargento)
    - "[tag rol.narrativo.*]"       # papel cultural en lore
    - "[tag rol.mecanico.*]"        # rol mecánico (lider, heroe — afecta fza_aportada)
    - "[tag lealtad.faccion.*]"     # lealtad a una facción
    - "[tag lealtad.pj.*]"          # lealtad a un personaje persistido
    - "[tag nemesis.pj.*]"          # enemistad identificada en batalla

  # ── Prosa biográfica ──────────────────────────────────────────────────────
  historia: str             # 120-200 palabras; LLM en creación; congelada al persistir

  # ── Historial de hitos ────────────────────────────────────────────────────
  historial:
    - fecha: "[variable hito_fecha]"        # ISO-8601
      tipo: "[variable hito_tipo]"          # agregar_tag | quitar_tag | ascenso | herida | ...
      descripcion: "[variable hito_descripcion]"
      ref_batalla: "[variable hito_ref_batalla]"  # slug o null
      metadata: {}

  # ── Metadatos ─────────────────────────────────────────────────────────────
  metadatos:
    creado_en: str          # ISO-8601
    canonizado_en: str      # ISO-8601 | null (null antes de persistir)
    ultima_actualizacion: str

  # ── Escape hatch ──────────────────────────────────────────────────────────
  extras: object            # diccionario libre, cualquier llave; null por defecto
