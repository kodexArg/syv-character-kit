# Ejemplos canónicos de personajes — muestran cómo los tags componen una hoja real.
# Referencia narrativa: tag-modelo.md
# Estructura de la hoja: hoja-modelo.md / hoja-modelo.yaml
#
# Cinco arquetipos pensados para ilustrar combinaciones diversas del sistema de tags:
#   1. Médico confederado — categorías canon, perfil entrenado.
#   2. Chamán del Ejército Rojo — tags emergentes/custom, extensibilidad en uso.
#   3. Líder revolucionario sin mando formal — rol narrativo desacoplado de rango.
#   4. Pandillero drogado, herido y desorientado — acumulación de tags salud/mental.
#   5. Soldado entrenado confederado — caso base limpio.
#
# NOTA — slug de personaje:
#   identidad.slug es una "patente" opaca de 8 caracteres [A-Z0-9]. No es el nombre.
#   El nombre legible vive en identidad.nombre.
#
# NOTA — vínculos personales:
#   Los aliados y némesis (otros personajes específicos) NO son tags. Viven en las
#   colecciones persistidas personaje.aliados[] y personaje.nemesis[], cada una con
#   ref (patente) + descripcion + desde (opcional). Ver hoja-modelo.md §3.4.
#   Las lealtades a facciones/escuadras (sin prosa) siguen siendo tags lealtad.*

personajes:

  # ─── 1. Médico confederado ────────────────────────────────────────────────
  - identidad:
      slug: SLG3D7K2
      nombre: Ernesto Salgado
      sobrenombre: Doctor Salgado
      rol: Médico de campaña
      genero: m
      edad: 38
    atributos: {fis: 3, tac: 4, men: 5}
    tags:
      - faccion.confederados
      - rango.segundo_al_mando
      - mando.capaz
      - estado.disponible
      - rasgo.altura_media
      - rasgo.manos_grandes
      - trait.taciturno
      - perk.tenaz
      - skill.medicina
      - skill.primeros_auxilios
      - skill.terreno
      - rol.oficio.medico
      - rol.jerarquia.sargento
      - equipo.arma.pistola
      - equipo.utilitario.botiquin
      - equipo.utilitario.vendaje
      - equipo.utilitario.vendaje
      - equipo.utilitario.cuaderno
      - equipo.vestidura.uniforme_confederado
      - lealtad.faccion.confederados
    historia: >
      Cirujano civil reclutado tras la ofensiva del Tercer Año. Aprendió a operar bajo fuego
      en los hospitales de campaña del norte y nunca volvió a la práctica civil. Habla poco,
      pero su escuadra sabe que mientras él esté en pie nadie muere desangrado en la trinchera.

  # ─── 2. Chamán del Ejército Rojo ──────────────────────────────────────────
  - identidad:
      slug: NMC8H5P9
      nombre: Lautaro Ñamcupán
      sobrenombre: El que habla con el monte
      rol: Chamán de columna
      genero: m
      edad: 54
    atributos: {fis: 3, tac: 3, men: 6}
    tags:
      - faccion.ejercito_rojo
      - rango.fusilero
      - estado.disponible
      - rasgo.alto
      - rasgo.delgado
      - rasgo.piel_curtida
      - rasgo.barba_canosa
      - trait.taciturno
      - trait.devoto
      - skill.meseta
      - skill.medicina
      - skill.oratoria          # origen: emergente — uso comunitario, no de mando
      - rol.narrativo.chaman    # origen: custom — categoría narrativa nueva
      - equipo.arma.revolver
      - equipo.utilitario.cuaderno
      - equipo.vestidura.ropa_de_civil
      - lealtad.faccion.ejercito_rojo
    historia: >
      Nunca empuñó un fusil hasta los cincuenta. Lo siguen porque conoce los pasos del
      monte, lee las nubes y entierra a los muertos con palabras que la columna entiende
      aunque no las hable. El revólver lo carga sin balas — dice que pesa lo justo para
      recordarse que la guerra todavía no terminó.
    aliados:
      - ref: CLF2M9K7
        descripcion: >
          Aniceto Calfucurá lo encontró en el monte tras la huida del fortín. Caminaron
          tres días sin hablar. Desde entonces el chamán está con la columna.

  # ─── 3. Líder revolucionario sin mando formal ─────────────────────────────
  - identidad:
      slug: BRD4F2M7
      nombre: Emilia Bordagaray
      sobrenombre: Camarada Emilia
      rol: Agitadora de columna
      genero: f
      edad: 31
    atributos: {fis: 3, tac: 4, men: 6}
    tags:
      - faccion.ejercito_rojo
      - rango.fusilero
      - estado.activo
      - escuadra.columna_mansilla
      - rasgo.altura_media
      - rasgo.pelo_corto
      - trait.lealtad_obrera
      - trait.mirada_larga
      - trait.carismatico
      - trait.voz_de_mando
      - skill.oratoria
      - skill.comisariado
      - skill.cartografia
      - rol.narrativo.lider_revolucionario
      - equipo.arma.smg
      - equipo.utilitario.cargador
      - equipo.utilitario.cargador
      - equipo.utilitario.cuaderno
      - equipo.vestidura.uniforme_rojo
      - lealtad.faccion.ejercito_rojo
      - lealtad.escuadra.columna_mansilla
    historia: >
      Llegó al frente como cuadro político y se quedó como fusilera. El líder de su
      escuadra le pide la palabra cuando hay que arengar; el resto de los días carga
      munición igual que cualquiera. Mando informal sin charreteras — exactamente
      como ella lo prefiere.
    aliados:
      - ref: MNS5X3P8
        descripcion: >
          Eduardo Mansilla, líder de su escuadra. Le cede la palabra en cada arenga
          porque sabe que ella convence donde él solo ordena. Pacto sin contrato.

  # ─── 4. Pandillero drogado, desorientado y herido ─────────────────────────
  - identidad:
      slug: MRL9K3X1
      nombre: Joaquín Morales
      sobrenombre: El Kuky
      rol: Irregular del litoral
      genero: m
      edad: 22
    atributos: {fis: 3, tac: 2, men: 2}
    tags:
      - faccion.ejercito_rojo
      - rango.recluta
      - estado.disponible
      - rasgo.delgado
      - rasgo.cicatriz_facial
      - trait.recluta_novato
      - trait.panico_en_abierto
      - salud.herido
      - salud.sangrando
      - salud.cansado
      - mental.confundido
      - mental.iracundo
      - rol.oficio.irregular        # origen: custom
      - equipo.arma.pistola
      - equipo.utilitario.cuchillo
      - equipo.vestidura.ropa_de_civil
    historia: >
      Lo levantaron en una redada de puerto y le pusieron un fusil en la mano dos días
      después. Pelea bien cuando pelea, pero hace cuatro horas que mastica algo que le
      sacó a un muerto y ya no escucha las órdenes. Sangra por la pierna y todavía no
      lo nota.

  # ─── 5. Soldado bien entrenado confederado ────────────────────────────────
  - identidad:
      slug: CBR7H4N6
      nombre: Diego Cabral
      sobrenombre: Cabo Cabral
      rol: Fusilero de primera
      genero: m
      edad: 29
    atributos: {fis: 3, tac: 5, men: 4}
    tags:
      - faccion.confederados
      - rango.apuntador
      - estado.activo
      - escuadra.cazadores_de_ricardo
      - rasgo.atletico
      - rasgo.pelo_corto
      - trait.templado_bajo_fuego
      - perk.cobertura
      - perk.recarga
      - skill.precision
      - skill.terreno
      - rol.oficio.tirador_designado
      - rol.jerarquia.sargento
      - equipo.arma.rifle_militar
      - equipo.utilitario.cargador
      - equipo.utilitario.cargador
      - equipo.utilitario.cargador
      - equipo.utilitario.prismaticos
      - equipo.vestidura.uniforme_confederado
      - lealtad.faccion.confederados
    historia: >
      Tercer ciclo de entrenamiento completo, dos campañas detrás y todas las medallas
      reglamentarias. Hace su trabajo y deja que otros hablen. El sargento Ricardo lo
      formó tirador y desde que cayó, Cabral no falla un disparo a menos de doscientos
      metros — es la manera que encontró de no olvidarlo.
    aliados:
      - ref: SRG1H4F9
        descripcion: >
          Sargento Ricardo, caído en la ofensiva del Tercer Año. Lo formó tirador.
          Cabral perpetúa su escuela cada vez que aprieta el gatillo.
        desde: "2024-03-15"
