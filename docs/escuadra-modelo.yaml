# Template programático de la escuadra.
# Referencia narrativa: escuadra-modelo.md
#
# Convención de marcas:
#   (*) campo obligatorio siempre
#   (+) campo obligatorio cuando el contexto lo demanda
#   sin marca: campo opcional

escuadra:

  identidad:
    slug:        str         # (*) lowercase + underscore. Coincide con el tag escuadra.{slug}.
                             #     Ej: "cazadores_de_ricardo", "columna_mansilla"
    nombre:      str         # (*) Nombre legible. Ej: "Cazadores de Ricardo"
    faccion:     str         # (*) slug de faccion. Ej: confederados | ejercito_rojo
    tipo:        str         # (*) Tipo de escuadra (reglas de validación). Ej: "escuadra_de_infanteria"

  # Lista de miembros asignados a la escuadra.
  miembros:                  # (*) lista; default []
    - ref:        str          # (*) Patente opaca [A-Z0-9]{8} del personaje.
      pos:        int          # (*) Orden táctico de combate.
      puntos:     int          # (*) Costo en puntos por rango. Rango: 1..5.
      rango:      str          # (*) Slug de rango del personaje.
      nombre:     str          # (*) Nombre de guerra / compuesto.
      aspectos:   list[str]    #     Descriptores narrativos del miembro dentro de la escuadra. default []
      iniciativa: null|object  #     Estado volátil de combate; default null.
                               #     Sub-objeto cuando hay encuentro activo:
                               #       encuentro: str   # patente [A-Z0-9]{8} del encuentro
                               #       valor:     int   # iniciativa final, clamped [0, 5]
                               #       columna:   int   # = valor
                               #       orden:     int   # id de extracción de la bolsa (1..n)
                               #     Ver escuadra-modelo.md §2.2.1 y gddr/02-motor-batalla.md §1.

  # Registro temporal de eventos que le ocurren a la escuadra.
  historial:                 # (*) lista; default []
    - fecha:       str       # (*) ISO-8601
      tipo:        str       # (*) enum abierto: baja_miembro | ascenso_miembro | combate_finalizado | reorganizacion
      descripcion: str       # (*) Prosa descriptiva
      ref_batalla: str       #     slug de batalla externa | null
      metadata:    object    #     libre

  metadatos:
    creado_en:            str   # (*) ISO-8601
    ultima_actualizacion: str   # (*) ISO-8601; actualiza ante altas, bajas o ascensos del grupo.

  extras: object             #     escape hatch libre; null por defecto
