# Template de archivo de catálogo de un tag.
# Ubicación: mock/tags/{categoria}/{slug}.yaml  o  mock/tags/{categoria}/{subcategoria}/{slug}.yaml
# Referencia narrativa: tag-modelo.md
# Ejemplos de uso compuesto: tag-modelo-ejemplos.yaml
#
# Convención de marcas:
#   (*) campo obligatorio siempre
#   (+) campo obligatorio cuando la categoría / subcategoría lo demanda
#   sin marca: campo opcional
#
# Forma canónica del tag en personaje.tags[]:  <categoria>[.<subcategoria>].<slug>

tag:

  slug:          str         # (*) slug del TAG (no del personaje): lowercase + underscore,
                             #     sin acentos. Ej: "pistola", "tirador_preciso", "ejercito_rojo".
                             #     El slug de personaje es una patente opaca [A-Z0-9]{8} —
                             #     ver hoja-modelo.md.
  nombre:        str         # (*)
  categoria:     str         # (*)  rasgo | trait | perk | aspecto | skill | faccion | rango |
                             #      escuadra | mando | estado | salud | mental | equipo | rol |
                             #      lealtad | nemesis | <nueva>
  descripcion:   str         # (*)
  peso:          int         # (+) requerido si categoria = equipo. Kilos. Rango 0..50.
                             #     No confundir con peso_narrativo (hint 1..5).

  subcategoria:  str         # (+) requerido si categoria ∈ {equipo, rol}
  origen:        str         #     canon | emergente | custom
  metadatos:
    version_introducida: str
    creado_en:           str
    ultima_actualizacion: str

  requires:
    require_all:
      - tag
      - "no:tag"             # prefijo literal "no:" invierte la condición
    require_any:
      - tag
      - "no:tag"

  excluye:
    - tag

  tags_relacionados:
    - tag

  peso_narrativo: int        # 1..5

  trigger:                   # opcional. Define cuándo se activa el comportamiento/efectos del tag
    evento:       str        # Evento disparador. Ej: "chequeo_moral", "daño_recibido", "bajo_fuego"
    condicion:    str        # Condición del evento. Ej: "fallado", "primera_vez"
    probabilidad: float      # opcional. Rango 0.0..1.0 (o string de porcentaje tipo "50%")

  efectos:                   # (+) requerido si categoria = aspecto.
                             #     Lista de referencias a tags de la categoría efecto.*
    - tag efecto.*           # Ej: efecto.furioso

  perk:
    efecto_reglado: str

  aspecto:
    tags_activables:
      - tag mental.*

  efecto:                    # (+) requerido si categoria = efecto.
                             #     Lista de instrucciones o modificadores de comportamiento.
    - str                    # Ej: "marcar objetivo: cualquier enemigo", "-50% a todas sus tiradas"

  skill:
    atributo_dominante: str  # fis | tac | men
    rangos_naturales:
      - tag rango.*
    facciones_predominantes:
      - tag faccion.*
    equipo_sugerido:
      - tag equipo.*

  equipo_arma:
    calibre:           str
    tipo_accion:       str   # (+) requerido si subcategoria = arma. cerrojo | semiauto | automatico | cuerpo_a_cuerpo
    municion_tag_ref:  tag equipo.utilitario.*
    alcance_narrativo: str   # corto | medio | largo

  equipo_vestidura:
    faccion_asociada: tag faccion.*

# Categorías relacionales (lealtad, nemesis) NO tienen archivo de catálogo.
# Su semántica vive en el formato del tag:
#   lealtad.faccion.{slug}  |  lealtad.pj.{slug}  |  lealtad.escuadra.{slug}
#   nemesis.pj.{slug}
# Las refs resuelven contra los catálogos de personajes y facciones.
# Los contenedores derivados "aliados" y "nemesis" se computan al servir (ver tag-modelo.md §5).
